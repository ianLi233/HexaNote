---
services:
  # Ollama removed - now using Nexa on Windows host (172.23.224.1:8883)

  weaviate:
    command:
    - --host
    - 0.0.0.0
    - --port
    - '8080'
    - --scheme
    - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.32.8
    ports:
    - 8080:8080
    - 50051:50051
    volumes:
    - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      ENABLE_API_BASED_MODULES: 'false'
      CLUSTER_HOSTNAME: 'node1'
      # No modules needed - we handle embeddings manually via Nexa
      ENABLE_MODULES: ''
      # Increase timeouts for slow inference
      MODULES_CLIENT_TIMEOUT: '300s'
      QUERY_MAXIMUM_RESULTS: 100
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'false'
      AUTHENTICATION_APIKEY_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: 'user-a-key,user-b-key'
      AUTHENTICATION_APIKEY_USERS: 'user-a,user-b'
      AUTHORIZATION_ENABLE_RBAC: 'true'
      AUTHORIZATION_RBAC_ROOT_USERS: 'user-a'

  backend:
    build: ./backend
    container_name: hexanote-backend
    ports:
      - "8001:8000"  
    volumes:
      - ./backend:/app
      - hexanote_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/hexanote.db
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_API_KEY=user-a-key
      - NEXA_URL=http://172.23.224.1:8883
      - NEXA_EMBED_URL=http://172.23.224.1:8883
      - NEXA_LLM_URL=http://172.23.224.1:8883
      - NEXA_EMBEDDING_MODEL=djuna/jina-embeddings-v2-base-en-Q5_K_M-GGUF:Q5_K_M
      - NEXA_GENERATION_MODEL=NexaAI/Llama3.2-3B-NPU-Turbo
      - DEBUG=false
    depends_on:
      - weaviate
    restart: on-failure:0

volumes:
  weaviate_data:
  hexanote_data:
...
